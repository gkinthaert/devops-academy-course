name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install requirements
        run: pip install -r 01-ci-lab/requirements.txt

      - name: Run tests
        run: pytest 01-ci-lab

