name: CI

on: [push]

#on:
#  push:
 #   branches:
 #     - main
 # pull_request:
 #   branches:
 #     - main


jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 01-ci-lab
    
    steps:

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install requirements
        run:  pip install -r requirements.txt

      - name: Run tests
        run:  pytest

      - name: Run linter
        run: flake8 .

  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 01-ci-lab

    permissions:
      id-token: write

    needs: test

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::238475938798:role/github-actions-lambda-deploy-role
          aws-region: us-east-2

      - name: Prepare Lambda package
        run: |
          cp app/calculator.py lambda_function.py
          zip function.zip lambda_function.py    

      - name: Create Lambda
        run: |
          aws lambda create-function \
            -- function-name calculator-app \
            -- role arn:aws:iam::238475938798:role/calculator-app-role \
            -- runtime python 3.13 \
            -- handler lambda_function.lambda_handler \
            -- zip-file fileb://function.zip

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            -- function-name calculator-app \
            -- zip-file fileb://function.zip
